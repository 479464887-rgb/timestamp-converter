<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}
header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:18px;font-weight:700;color:#58a6ff}
.logo span{color:#f0c040}
header .badge{font-size:10px;background:#daa520;color:#fff;padding:2px 8px;border-radius:10px;margin-left:8px}
main{max-width:700px;margin:0 auto;padding:32px 24px;flex:1}
.tool-wrapper{padding:20px 0}
footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}
footer a{color:#58a6ff;text-decoration:none;margin:0 8px}
.btn-primary:hover{background:#2ea043!important}
.btn:hover{background:#30363d!important}

</style>

<body>
<header>
  <div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div>
  <div style="font-size:11px;color:#8b949e">🔒 Processed locally · 数据不Upload</div>
</header>
<main>
  <h1 style="font-size:24px;margin-bottom:4px">Timestamp Converter</h1>
  <p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线时间戳Convert器 - Unix时间戳与日期互转，支持秒/毫秒级</p>
<div class="tool-wrapper">
  <div class="panel" style="margin-bottom:16px"><div style="font-size:12px;color:#8b949e;margin-bottom:6px">当前时间戳</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
    <div style="flex:1;min-width:120px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;text-align:center"><div id="now-seconds" style="font-size:24px;font-weight:700;color:#58a6ff;font-family:mono">-</div><div style="font-size:11px;color:#8b949e;margin-top:4px">秒 (10位)</div></div>
    <div style="flex:1;min-width:120px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;text-align:center"><div id="now-millis" style="font-size:24px;font-weight:700;color:#58a6ff;font-family:mono">-</div><div style="font-size:11px;color:#8b949e;margin-top:4px">毫秒 (13位)</div></div>
    <div style="flex:1;min-width:120px;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;text-align:center"><div id="now-iso" style="font-size:14px;font-weight:600;color:#3fb950;font-family:mono">-</div><div style="font-size:11px;color:#8b949e;margin-top:4px">ISO 8601</div></div>
  </div></div>
  <div class="panel"><div style="font-size:12px;color:#8b949e;margin-bottom:6px">时间戳 → 日期</div>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <input type="text" id="ts-input" placeholder="Input时间戳..." style="flex:1;padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:14px;outline:none;font-family:mono">
    <button class="btn btn-primary" style="padding:10px 20px;background:#238636;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600" onclick="tsToDate()">Convert</button>
  </div>
  <div id="ts-result" style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;font-family:mono;font-size:13px;min-height:40px;color:#c9d1d9">Input时间戳查看对应日期</div></div>
  <div class="panel" style="margin-top:16px"><div style="font-size:12px;color:#8b949e;margin-bottom:6px">日期 → 时间戳</div>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <input type="datetime-local" id="dt-input" style="flex:1;padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:14px;outline:none">
    <button class="btn btn-primary" style="padding:10px 20px;background:#238636;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600" onclick="dateToTs()">Convert</button>
  </div>
  <div id="dt-result" style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;font-family:mono;font-size:13px;min-height:40px;color:#c9d1d9">选择日期查看对应时间戳</div></div>
</div>
</main>
<footer>
  <a href="https://github.com/479464887-rgb/timestamp-converter">GitHub</a>
  <span>·</span>
  <a href="mailto:tulv202900@163.com">Contact</a>
  <span>·</span>
  <span>© 2026 DevKit</span>
</footer>
<script>
function updateNow() {
  const now = new Date();
  document.getElementById('now-seconds').textContent = Math.floor(now.getTime() / 1000);
  document.getElementById('now-millis').textContent = now.getTime();
  document.getElementById('now-iso').textContent = now.toISOString();
}
setInterval(updateNow, 1000); updateNow();

function tsToDate() {
  let ts = document.getElementById('ts-input').value.trim();
  if (!ts) return;
  if (ts.length <= 10) ts = parseInt(ts) * 1000; else ts = parseInt(ts);
  const d = new Date(ts);
  if (isNaN(d.getTime())) { document.getElementById('ts-result').innerHTML = '<span style="color:#f85149">无效的时间戳</span>'; return; }
  document.getElementById('ts-result').innerHTML = `
    UTC: ${d.toUTCString()}<br>本地: ${d.toLocaleString('zh-CN')}<br>ISO: ${d.toISOString()}<br>年:${d.getFullYear()} 月:${d.getMonth()+1} 日:${d.getDate()} 星期${['日','一','二','三','四','五','六'][d.getDay()]}
  `;
}
function dateToTs() {
  const v = document.getElementById('dt-input').value;
  if (!v) return;
  const d = new Date(v);
  const s = Math.floor(d.getTime() / 1000);
  document.getElementById('dt-result').innerHTML = `秒 (10位): ${s}<br>毫秒 (13位): ${d.getTime()}<br>ISO: ${d.toISOString()}`;
}
document.getElementById('ts-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') tsToDate(); });
</script>
</body>
</html>
